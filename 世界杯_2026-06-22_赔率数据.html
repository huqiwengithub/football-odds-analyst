  return '<span class="hc">0</span>';

  else if (isAway) cls = 'lo';
  return '<span class="'+cls+'">'+v.toFixed(2)+'</span>';
}

    html += '<td>'+fmtOdds(v.home, homeIsFav, false)+'</td>';
    html += '<td>'+fmtOdds(v.draw, false, false)+'</td>';
    html += '<td>'+fmtOdds(v.away, false, awayIsFav)+'</td>';
    html += '</tr>';
  }
  html += '</tbody></table></div>';
  
  // AH
  html += '<div><table><thead><tr><th>亚洲盘</th><th>水位</th><th>盘口</th><th>水位</th></tr></thead><tbody>';
  const ahKeys = [{k:'ah_am', n:'澳门'},{k:'ah_bet365', n:'bet365'},{k:'ah_hg', n:'皇冠'}];
  for (let a of ahKeys) {
    let v = m[a.k];
    if (!v) continue;
    html += '<tr><td>'+a.n+'</td>';
    html += '<td>'+v.home_water.toFixed(2)+'</td>';
    html += '<td style="font-weight:700;color:#1677ff">'+(v.handicap>0?'+':'')+v.handicap+'</td>';
    html += '<td>'+v.away_water.toFixed(2)+'</td></tr>';
  }
  html += '</tbody></table></div>';
  
  // OU
  html += '<div><table><thead><tr><th>大小球</th><th>大球</th><th>盘口</th><th>小球</th></tr></thead><tbody>';
  const ouKeys = [{k:'ou_am', n:'澳门'},{k:'ou_bet365', n:'bet365'}];
  for (let o of ouKeys) {
    let v = m[o.k];
    if (!v) continue;
    html += '<tr><td>'+o.n+'</td>';
    html += '<td>'+v.over_water.toFixed(2)+'</td>';
    html += '<td style="font-weight:700;color:#1677ff">'+v.line+'</td>';
    html += '<td>'+v.under_water.toFixed(2)+'</td></tr>';
  }
  html += '</tbody></table></div>';
  
  html += '</div></div>';
  
  // RQSPF
  html += '<div class="section"><div class="section-title">让球胜平负 RQSPF ('+fmtHC(m.handicap_rqspf)+')</div>';
  html += '<div class="sub-grid"><div><table><thead><tr><th>来源</th><th>主胜</th><th>平局</th><th>客胜</th></tr></thead><tbody>';
  if (m.rqspf_lc) {
    html += '<tr><td>竞彩官方</td>';
    html += '<td>'+fmtOdds(m.rqspf_lc.home, homeIsFav, false)+'</td>';
    html += '<td>'+fmtOdds(m.rqspf_lc.draw, false, false)+'</td>';
    html += '<td>'+fmtOdds(m.rqspf_lc.away, false, awayIsFav)+'</td></tr>';
  } else {
    html += '<tr><td>竞彩官方</td><td colspan="3"><span class="badge-ns">未开售</span></td></tr>';
  }
  if (m.rqspf_avg) {
    html += '<tr><td>百家平均</td>';
    html += '<td>'+fmtOdds(m.rqspf_avg.home, homeIsFav, false)+'</td>';
    html += '<td>'+fmtOdds(m.rqspf_avg.draw, false, false)+'</td>';
    html += '<td>'+fmtOdds(m.rqspf_avg.away, false, awayIsFav)+'</td></tr>';
  }
  html += '</tbody></table></div></div></div>';
  
  // JQS
  if (m.jqs) {
    html += '<div class="section"><div class="section-title">总进球数 JQS</div>';
    html += '<table class="jqs-table"><thead><tr><th>0球</th><th>1球</th><th>2球</th><th>3球</th><th>4球</th><th>5球</th><th>6球</th><th>7+球</th></tr></thead><tbody><tr>';
    let jqsVals = [];
    for (let k of ['0','1','2','3','4','5','6','7']) {
      jqsVals.push({k, v: m.jqs[k]});
    }
    let jqsMin = Infinity;
    for (let j of jqsVals) if (j.v < jqsMin) jqsMin = j.v;
    for (let j of jqsVals) {
      let cls = j.v === jqsMin ? 'hi' : '';
      html += '<td class="'+cls+'">'+j.v.toFixed(2)+'</td>';
    }
    html += '</tr></tbody></table></div>';
  }
  
  // BQC
  if (m.bqc) {
    html += '<div class="section"><div class="section-title">半全场 BQC</div>';
    html += '<div class="bqc-grid">';
    const bqcOrder = ['胜胜','胜平','胜负','平胜','平平','平负','负胜','负平','负负'];
    let bqcMin = Infinity;
    for (let k of bqcOrder) { if (m.bqc[k] && m.bqc[k] < bqcMin) bqcMin = m.bqc[k]; }
    for (let k of bqcOrder) {
      let v = m.bqc[k];
      let cls = v === bqcMin ? 'hi' : 'lo';
      html += '<div class="bqc-item"><div class="bqc-label">'+k+'</div><div class="bqc-odds '+cls+'">'+v.toFixed(2)+'</div></div>';
    }
    html += '</div></div>';
  }
  
  // BF - show top 12
  if (m.bf) {
    html += '<div class="section"><div class="section-title">比分 BF（低赔 TOP 12）</div>';
    let bfEntries = Object.entries(m.bf).sort((a,b) => a[1] - b[1]).slice(0, 12);
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;">';
    for (let [score, odds] of bfEntries) {
      html += '<span style="display:inline-block;padding:4px 10px;background:#fafafa;border-radius:6px;font-size:12px;">';
      html += '<span style="color:#666;">'+score+'</span> ';
      html += '<span style="font-weight:700;color:#cf1322;">'+odds.toFixed(2)+'</span></span>';
    }
    html += '</div></div>';
  }
  
  html += '</div></div>';
  return html;
}

function toggleAll() {
  let bodies = document.querySelectorAll('.match-body');
  let arrows = document.querySelectorAll('.match-header .arrow');
  let allOpen = [...bodies].every(function(b) { return b.classList.contains('show'); });
  bodies.forEach(function(b) { b.classList.toggle('show', !allOpen); });
  arrows.forEach(function(a) { a.classList.toggle('open', !allOpen); });
}

document.getElementById('matches').innerHTML = DATA.map(renderMatch).join('');

// Event delegation for match toggle
document.getElementById('matches').addEventListener('click', function(e) {
  var header = e.target.closest('.match-header');
  if (!header) return;
  var body = header.nextElementSibling;
  var arrow = header.querySelector('.arrow');
  if (body) body.classList.toggle('show');
  if (arrow) arrow.classList.toggle('open');
});

// Open first match by default
var firstBody = document.querySelector('.match-body');
var firstArrow = document.querySelector('.match-header .arrow');
if (firstBody) firstBody.classList.add('show');
if (firstArrow) firstArrow.classList.add('open');

// Toggle all button
document.getElementById('btnToggleAll').addEventListener('click', toggleAll);
</script>
</body>
